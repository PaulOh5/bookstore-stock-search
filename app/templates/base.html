<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}오프북서치{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    accent: { DEFAULT: '#6C5CE7', hover: '#5A4BD1', light: '#EDE9FE', soft: '#F5F3FF' },
                    surface: '#FAFAF8',
                    'card-border': '#F0EDE8',
                    success: { DEFAULT: '#00B894', light: '#D1FAE5' },
                    danger: { DEFAULT: '#E17055', light: '#FEE2E2' },
                    warm: { 50: '#FAFAF8', 100: '#F5F0EB', 200: '#E8E0D8' },
                },
                fontFamily: {
                    sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Helvetica Neue', 'sans-serif'],
                },
                animation: {
                    'fade-in': 'fadeIn 0.4s ease-out forwards',
                    'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    'slide-down': 'slideDown 0.3s ease-out forwards',
                    'spinner': 'spin 0.8s linear infinite',
                },
                keyframes: {
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    fadeInUp: {
                        '0%': { opacity: '0', transform: 'translateY(12px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    slideDown: {
                        '0%': { opacity: '0', maxHeight: '0' },
                        '100%': { opacity: '1', maxHeight: '500px' },
                    },
                },
            },
        },
    }
    </script>
    <style>
        body { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .inventory-panel { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.35s ease-out, opacity 0.25s ease-out; }
        .inventory-panel.open { max-height: 800px; opacity: 1; }
        .chevron { transition: transform 0.2s ease; }
        .chevron.rotate { transform: rotate(180deg); }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .btn-press { transition: transform 0.1s ease; }
        .btn-press:active { transform: scale(0.97); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .safe-top { padding-top: env(safe-area-inset-top, 0px); }
    </style>
</head>
<body class="bg-surface min-h-screen font-sans">
    <header class="bg-gradient-to-r from-accent to-[#a29bfe] sticky top-0 z-50 safe-top">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-2.5">
            <a href="/" class="flex items-center gap-2 text-white no-underline">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    <path d="M8 7h8M8 11h6"/>
                </svg>
                <div>
                    <span class="text-lg font-bold tracking-tight">오프북서치</span>
                    <p class="text-[11px] text-white/70 -mt-0.5">오프라인 서점 통합 재고 검색</p>
                </div>
            </a>
        </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-5 safe-bottom">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
