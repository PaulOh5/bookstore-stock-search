{% extends "base.html" %}
{% block title %}오프북서치 - 오프라인 서점 재고 검색{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-120px)] flex flex-col items-center justify-center -mt-5">
    <div class="animate-fade-in-up text-center w-full max-w-sm mx-auto">
        <!-- Brand illustration -->
        <div class="mb-6">
            <svg class="mx-auto w-20 h-20 text-accent" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="14" y="12" width="32" height="44" rx="3" fill="#EDE9FE" stroke="#6C5CE7"/>
                <path d="M22 22h16M22 28h12M22 34h14" stroke="#6C5CE7" stroke-width="2"/>
                <circle cx="54" cy="52" r="14" fill="#F5F3FF" stroke="#6C5CE7" stroke-width="2.5"/>
                <line x1="64" y1="62" x2="72" y2="70" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- Copy -->
        <h1 class="text-2xl font-bold text-gray-900 mb-1.5">어디 서점에 있을까?</h1>
        <p class="text-sm text-gray-500 mb-8">가까운 오프라인 서점 재고를 한 번에 검색해요</p>

        <!-- Search form -->
        <form action="/search" method="get">
            <div class="relative mb-3">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input
                    type="text"
                    name="q"
                    placeholder="책 제목, 저자, ISBN으로 검색"
                    class="w-full pl-12 pr-4 py-4 bg-white border-0 rounded-2xl shadow-lg text-base placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:ring-offset-2"
                    autofocus
                    required
                >
            </div>
            <button
                type="submit"
                class="w-full py-3.5 bg-accent text-white rounded-2xl font-semibold text-base hover:bg-accent-hover btn-press shadow-md shadow-accent/20"
            >검색하기</button>
        </form>
    </div>
</div>
{% endblock %}
