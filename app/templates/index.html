{% extends "base.html" %}
{% block title %}Off-Book-Search - 오프라인 서점 재고 검색{% endblock %}
{% block content %}
<div class="mt-12 text-center">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">오프라인 서점 재고 검색</h1>
    <p class="text-gray-600 mb-8">책을 검색하면 근처 서점의 오프라인 재고를 한 번에 확인합니다</p>
    <form action="/search" method="get" class="max-w-lg mx-auto">
        <div class="flex gap-2">
            <input
                type="text"
                name="q"
                placeholder="책 제목, 저자, ISBN으로 검색"
                class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
                autofocus
                required
            >
            <button
                type="submit"
                class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-lg"
            >검색</button>
        </div>
    </form>
</div>
{% endblock %}
